version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel_postgres
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-hotel_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hotel_secret_2024}
      POSTGRES_DB: ${DB_NAME:-hotel_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-hotel_admin} -d ${DB_NAME:-hotel_management}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hotel_pgadmin
    restart: unless-stopped
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hotel.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hotel_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  hotel_network:
    driver: bridge
